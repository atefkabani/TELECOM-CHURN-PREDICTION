<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Telecom Churn ML Dashboard</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Inter;
      }

      body {
        background: #0f172a;
        color: white;
        display: flex;
        height: 100vh;
      }

      /* sidebar */

      .sidebar {
        width: 230px;
        background: #020617;
        padding: 30px;
        border-right: 1px solid #1e293b;
      }

      .sidebar h2 {
        margin-bottom: 30px;
        color: #38bdf8;
      }

      .sidebar p {
        color: #94a3b8;
        margin-top: 10px;
        font-size: 14px;
      }

      /* main */

      .main {
        flex: 1;
        padding: 40px;
        overflow: auto;
      }

      /* cards */

      .card {
        background: #1e293b;
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 25px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4);
      }

      .card h3 {
        margin-bottom: 15px;
      }

      /* grid */

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
      }

      label {
        font-size: 12px;
        color: #94a3b8;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        color: white;
      }

      /* button */

      button {
        margin-top: 20px;
        width: 100%;
        padding: 12px;
        background: #38bdf8;
        border: none;
        border-radius: 8px;
        color: black;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #0ea5e9;
      }

      /* result */

      .resultCard {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .prediction {
        font-size: 26px;
        font-weight: 600;
      }

      .churn {
        color: #ef4444;
      }

      .stay {
        color: #22c55e;
      }

      /* probability bar */

      .barContainer {
        margin-top: 15px;
        height: 20px;
        background: #334155;
        border-radius: 20px;
        overflow: hidden;
      }

      .bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #22c55e, #ef4444);
        transition: 1s;
      }

      /* responsive */

      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 700px) {
        body {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>ML Dashboard</h2>

      <p>Telecom Churn Predictor</p>

      <p>Model: Logistic Regression</p>

      <p>Version: 1.0</p>
    </div>

    <div class="main">
      <div class="card">
        <h3>Customer Information</h3>

        <form id="churnForm">
          <div class="grid">
            <div>
              <label>Gender</label>
              <select name="gender">
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>

            <div>
              <label>Senior Citizen</label>
              <select name="SeniorCitizen">
                <option value="0">No</option>
                <option value="1">Yes</option>
              </select>
            </div>

            <div>
              <label>Partner</label>
              <select name="Partner">
                <option>Yes</option>
                <option>No</option>
              </select>
            </div>

            <div>
              <label>Dependents</label>
              <select name="Dependents">
                <option>Yes</option>
                <option>No</option>
              </select>
            </div>

            <div>
              <label>Tenure</label>
              <input name="tenure" type="number" />
            </div>

            <div>
              <label>Phone Service</label>
              <select name="PhoneService">
                <option>Yes</option>
                <option>No</option>
              </select>
            </div>

            <div>
              <label>Internet Service</label>
              <select name="InternetService">
                <option>DSL</option>
                <option>Fiber optic</option>
                <option>No</option>
              </select>
            </div>

            <div>
              <label>Contract</label>
              <select name="Contract">
                <option>Month-to-month</option>
                <option>One year</option>
                <option>Two year</option>
              </select>
            </div>

            <div>
              <label>Payment Method</label>
              <select name="PaymentMethod">
                <option>Electronic check</option>
                <option>Mailed check</option>
                <option>Bank transfer (automatic)</option>
                <option>Credit card (automatic)</option>
              </select>
            </div>

            <div>
              <label>Monthly Charges</label>
              <input name="MonthlyCharges" type="number" step="0.01" />
            </div>

            <div>
              <label>Total Charges</label>
              <input name="TotalCharges" type="number" step="0.01" />
            </div>
          </div>

          <button type="submit">Run Prediction</button>
        </form>
      </div>

      <div class="card resultCard">
        <div>
          <h3>Prediction Result</h3>

          <div id="prediction" class="prediction">Waiting...</div>

          <div class="barContainer">
            <div id="probBar" class="bar"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById("churnForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const formData = new FormData(this);

          const response = await fetch("/predict", {
            method: "POST",
            body: formData,
          });

          const data = await response.json();

          const predictionText = document.getElementById("prediction");
          const bar = document.getElementById("probBar");

          if (data.prediction === "Churn") {
            predictionText.innerHTML = "Customer Will Churn";
            predictionText.className = "prediction churn";

            bar.style.width = "80%";
          } else if (data.prediction === "Not Churn") {
            predictionText.innerHTML = "Customer Will Stay";
            predictionText.className = "prediction stay";

            bar.style.width = "20%";
          } else {
            predictionText.innerHTML = "Error: " + data.error;
            predictionText.className = "prediction";

            bar.style.width = "0%";
          }
        });
    </script>
  </body>
</html>

        });
    </script>
  </body>
</html>
